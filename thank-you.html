<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | MCHEN Machine Parts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#0B3D6B;--primary-light:#1565C0;--accent:#E8A838;--accent-dark:#C78A20;--dark:#0D1B2A;--gray-900:#1B2838;--gray-700:#3D5068;--gray-500:#6B8299;--gray-300:#B0C4D8;--gray-100:#E8EFF5;--gray-50:#F4F7FA;--white:#FFF;--font:'Plus Jakarta Sans',-apple-system,sans-serif;--max-w:1200px}
html{scroll-behavior:smooth}body{font-family:var(--font);color:var(--gray-900);line-height:1.6;background:var(--white)}
img{max-width:100%;display:block}a{text-decoration:none;color:inherit}
.container{max-width:var(--max-w);margin:0 auto;padding:0 24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:6px;font-weight:600;font-size:15px;font-family:var(--font);transition:all .3s;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:var(--dark)}.btn-primary:hover{background:var(--accent-dark)}
.btn-dark{background:var(--primary);color:var(--white)}.btn-dark:hover{background:var(--primary-light)}
.thank-you{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 24px}
.thank-you h1{font-size:36px;font-weight:800;color:var(--dark);margin-bottom:16px}
.thank-you p{font-size:17px;color:var(--gray-500);line-height:1.7;max-width:520px;margin:0 auto 32px}
.thank-you .ctas{display:flex;gap:12px;justify-content:center}
.check{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;margin:0 auto 24px;color:var(--white);font-size:36px}
</style>
</head>
<body>
<header style="background:var(--dark);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:1000">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;height:72px">
    <a href="index.html" style="display:flex;align-items:center"><img src="images/mchen-logo.png" alt="MCHEN Machine Parts" style="height:56px;object-fit:contain"></a>
    <nav style="display:flex;align-items:center;gap:28px">
      <a href="index.html" style="font-size:14px;font-weight:500;color:var(--gray-300)">Home</a>
      <a href="products.html" style="font-size:14px;font-weight:500;color:var(--gray-300)">Products</a>
      <a href="contact.html" style="font-size:14px;font-weight:500;color:var(--gray-300)">Contact</a>
    </nav>
  </div>
</header>

<section class="thank-you">
  <div>
    <div class="check">&#10003;</div>
    <h1>Thank You!</h1>
    <p>Your message has been received. Our team will review your inquiry and get back to you within 24 hours.</p>
    <div class="ctas">
      <a href="index.html" class="btn btn-primary">Back to Home</a>
      <a href="products.html" class="btn btn-dark">Browse Products</a>
    </div>
  </div>
</section>
</body>
</html>
